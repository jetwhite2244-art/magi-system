<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAGI">
<meta name="theme-color" content="#050508">
<title>MAGI SYSTEM</title>
<style>
  :root {
    --accent: #f0a500;
    --bg: #050508;
    --card: rgba(0,0,0,0.82);
    --text: #cccccc;
    --dim: #444444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 20px; }
  .header-sub { font-size: 9px; color: #333; letter-spacing: 4px; margin-bottom: 6px; }
  .header-title {
    font-size: clamp(20px, 6vw, 36px);
    letter-spacing: 8px; font-weight: 300; color: #fff;
    text-shadow: 0 0 30px rgba(240,165,0,0.4);
    transition: text-shadow 0.5s;
  }
  .header-theme { font-size: 9px; color: #444; letter-spacing: 3px; margin-top: 4px; }
  .header-line {
    width: 140px; height: 1px; margin: 12px auto 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: background 0.5s;
  }

  /* THEME SWITCHER */
  .theme-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 20px;
  }
  .theme-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222; color: #444;
    padding: 6px 12px; cursor: pointer;
    font-size: 11px; letter-spacing: 1px;
    border-radius: 2px; font-family: inherit;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .theme-btn.active {
    background: rgba(240,165,0,0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(240,165,0,0.2);
  }

  /* INPUT BOX */
  .input-box {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(240,165,0,0.15);
    border-radius: 3px; padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(240,165,0,0.05);
    transition: border-color 0.4s;
  }
  .input-label { font-size: 9px; color: rgba(240,165,0,0.6); letter-spacing: 3px; margin-bottom: 8px; }
  textarea {
    width: 100%; background: transparent; border: none;
    color: var(--text); font-family: inherit;
    font-size: 13px; line-height: 1.7; resize: none;
    -webkit-appearance: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: #333; }
  .input-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .exec-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent); padding: 8px 22px;
    cursor: pointer; font-size: 11px;
    letter-spacing: 3px; border-radius: 2px;
    font-family: inherit; transition: all 0.2s;
    box-shadow: 0 0 10px rgba(240,165,0,0.2);
    -webkit-tap-highlight-color: transparent;
  }
  .exec-btn:disabled { border-color: #222; color: #333; box-shadow: none; cursor: not-allowed; }

  /* UNITS GRID */
  .units-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 0;
  }
  @media (max-width: 600px) {
    .units-grid { grid-template-columns: 1fr; }
  }

  /* UNIT CARD */
  .unit-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px; padding: 16px;
    position: relative; overflow: hidden;
    transition: box-shadow 0.4s, border-color 0.4s;
  }
  .unit-card.active-glow { border-color: var(--unit-color); }
  .scanline {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
    pointer-events: none; z-index: 1;
  }
  .unit-meta { font-size: 9px; letter-spacing: 3px; margin-bottom: 3px; opacity: 0.6; }
  .unit-name { font-size: 14px; font-weight: bold; letter-spacing: 2px; margin-bottom: 3px; }
  .unit-role { font-size: 10px; color: #555; letter-spacing: 1px; }
  .unit-divider { height: 1px; margin: 10px 0; }
  .unit-progress { height: 1px; background: #111; margin-bottom: 12px; border-radius: 1px; overflow: hidden; }
  .unit-progress-bar { height: 100%; width: 0; transition: width 0.08s linear; }
  .unit-body {
    min-height: 90px; font-size: 12px; line-height: 1.85;
    color: var(--text); position: relative; z-index: 2;
  }
  .unit-standby { color: #222; font-size: 10px; }
  .unit-loading { animation: pulse 1s infinite; }
  .unit-vote {
    margin-top: 12px; padding: 5px 10px;
    border-radius: 2px; font-size: 10px;
    letter-spacing: 2px; text-align: center;
  }
  .unit-vote.approved { background: rgba(76,175,80,0.07); border: 1px solid #4caf50; color: #4caf50; }
  .unit-vote.rejected { background: rgba(244,67,54,0.07); border: 1px solid #f44336; color: #f44336; }

  /* VERDICT */
  .verdict-box {
    background: rgba(0,0,0,0.88);
    border: 1px solid rgba(76,175,80,0.3);
    border-radius: 3px; padding: 20px; margin-top: 16px;
    position: relative; overflow: hidden;
    animation: fadeIn 0.5s ease;
  }
  .verdict-box.rejected { border-color: rgba(244,67,54,0.3); }
  .verdict-label { font-size: 9px; color: #333; letter-spacing: 3px; margin-bottom: 10px; }
  .verdict-text { font-size: 12px; line-height: 1.85; color: var(--text); }
  .verdict-result {
    margin-top: 14px; font-size: 16px; letter-spacing: 5px; font-weight: bold;
  }
  .verdict-result.approved { color: #4caf50; text-shadow: 0 0 16px #4caf50; }
  .verdict-result.rejected { color: #f44336; text-shadow: 0 0 16px #f44336; }

  /* CUSTOMIZE PANEL */
  .customize-toggle {
    text-align: center; margin: 20px 0 0;
  }
  .customize-toggle button {
    background: transparent; border: 1px solid #222;
    color: #444; padding: 6px 20px; cursor: pointer;
    font-size: 10px; letter-spacing: 2px;
    border-radius: 2px; font-family: inherit;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .customize-toggle button:hover { border-color: #555; color: #666; }
  .customize-panel {
    background: rgba(0,0,0,0.7);
    border: 1px solid #1a1a1a; border-radius: 3px;
    padding: 20px; margin-top: 12px;
    display: none;
  }
  .customize-panel.open { display: block; animation: fadeIn 0.3s ease; }
  .customize-header {
    font-size: 9px; color: #555; letter-spacing: 3px;
    margin-bottom: 16px; border-bottom: 1px solid #111; padding-bottom: 10px;
  }
  .unit-editor { margin-bottom: 20px; }
  .unit-editor-title {
    font-size: 11px; letter-spacing: 2px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .unit-editor-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .field-label { font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 4px; }
  .field-input {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid #1a1a1a; color: var(--text);
    padding: 7px 10px; font-family: inherit;
    font-size: 12px; border-radius: 2px; margin-bottom: 10px;
    -webkit-appearance: none;
  }
  .field-input:focus { outline: none; border-color: #333; }
  .field-textarea {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid #1a1a1a; color: var(--text);
    padding: 7px 10px; font-family: inherit;
    font-size: 11px; line-height: 1.6;
    border-radius: 2px; resize: vertical; min-height: 80px;
    margin-bottom: 10px; -webkit-appearance: none;
  }
  .field-textarea:focus { outline: none; border-color: #333; }
  .customize-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
  }
  .save-btn {
    background: rgba(240,165,0,0.1); border: 1px solid var(--accent);
    color: var(--accent); padding: 7px 18px; cursor: pointer;
    font-size: 10px; letter-spacing: 2px; border-radius: 2px;
    font-family: inherit; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .reset-btn {
    background: transparent; border: 1px solid #222;
    color: #444; padding: 7px 18px; cursor: pointer;
    font-size: 10px; letter-spacing: 2px; border-radius: 2px;
    font-family: inherit; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .save-feedback {
    font-size: 10px; color: #4caf50; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.3s; align-self: center;
  }
  .save-feedback.show { opacity: 1; }

  /* FOOTER */
  .footer { text-align: center; margin-top: 32px; font-size: 9px; color: #1a1a1a; letter-spacing: 2px; }

  /* ANIMATIONS */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .cursor { animation: blink 0.7s infinite; }
</style>
</head>

const THEME_ORDER = ["furusato", "numazu", "writer", "career", "legal"];

// ============================================================
// STATE
// ============================================================
let activeThemeId = "furusato";
let customThemes = JSON.parse(JSON.stringify(DEFAULT_THEMES)); // deep copy
let responses = {};
let loadingStates = {};
let votes = {};
let verdict = null;
let isRunning = false;
let progressIntervals = {};

// Try load custom themes from localStorage
try {
  const saved = localStorage.getItem("magi_custom_themes");
  if (saved) customThemes = JSON.parse(saved);
} catch(e) {}

// ============================================================
// THEME SWITCHING
// ============================================================
function getTheme() { return customThemes[activeThemeId]; }

function switchTheme(id) {
  if (isRunning) return;
  activeThemeId = id;
  responses = {}; loadingStates = {}; votes = {}; verdict = null;
  applyThemeCSS();
  renderThemeBar();
  renderUnits();
  renderVerdict();
  renderCustomizePanel();
  const t = getTheme();
  document.getElementById("headerTheme").textContent = t.headerSub;
  document.getElementById("inputLabel").textContent = `INPUT · 判断依頼 · ${t.label}`;
  document.getElementById("queryInput").placeholder = `${t.label}に関する事案を入力…`;
}

function applyThemeCSS() {
  const t = getTheme();
  document.documentElement.style.setProperty("--accent", t.accent);
  document.getElementById("headerLine").style.background =
    `linear-gradient(90deg, transparent, ${t.accent}, transparent)`;
  document.getElementById("headerTitle").style.textShadow =
    `0 0 30px ${t.accent}66`;
  document.getElementById("inputBox").style.borderColor = t.accent + "22";
  document.getElementById("execBtn").style.borderColor = t.accent;
  document.getElementById("execBtn").style.color = t.accent;
  document.getElementById("execBtn").style.boxShadow = `0 0 10px ${t.accent}33`;
}

// ============================================================
// RENDER THEME BAR
// ============================================================
function renderThemeBar() {
  const bar = document.getElementById("themeBar");
  bar.innerHTML = THEME_ORDER.map(tid => {
    const t = customThemes[tid];
    const active = tid === activeThemeId;
    return `<button class="theme-btn ${active ? "active" : ""}"
      style="${active ? `background:${t.accent}18;border-color:${t.accent};color:${t.accent};box-shadow:0 0 10px ${t.accent}33` : ""}"
      onclick="switchTheme('${tid}')">${t.icon} ${t.label}</button>`;
  }).join("");
}

// ============================================================
// RENDER UNITS
// ============================================================
function renderUnits() {
  const grid = document.getElementById("unitsGrid");
  const t = getTheme();
  grid.innerHTML = t.units.map(unit => `
    <div class="unit-card" id="card-${unit.id}" style="--unit-color:${unit.color}">
      <div class="scanline"></div>
      <div class="unit-meta" style="color:${unit.color}88">MAGI // ${unit.id.toUpperCase()}</div>
      <div class="unit-name" style="color:${unit.color};text-shadow:0 0 10px ${unit.color}88">${unit.name}</div>
      <div class="unit-role">${unit.subtitle} · ${unit.role}</div>
      <div class="unit-divider" style="background:${unit.color}18"></div>
      <div class="unit-progress" id="progress-${unit.id}">
        <div class="unit-progress-bar" id="progressBar-${unit.id}"
          style="background:linear-gradient(90deg,${unit.color}55,${unit.color});box-shadow:0 0 6px ${unit.color}"></div>
      </div>
      <div class="unit-body" id="body-${unit.id}">
        <span class="unit-standby">STANDBY · AWAITING INPUT</span>
      </div>
      <div id="vote-${unit.id}"></div>
    </div>
  `).join("");
}

// ============================================================
// TYPEWRITER
// ============================================================
function typeWrite(elementId, text, color, speed = 16) {
  const el = document.getElementById(elementId);
  if (!el) return;
  let i = 0;
  el.innerHTML = `<span class="cursor" style="color:${color}">▌</span>`;
  const t = setInterval(() => {
    el.innerHTML = text.slice(0, i) + `<span class="cursor" style="color:${color}">▌</span>`;
    i++;
    if (i > text.length) {
      clearInterval(t);
      el.innerHTML = text;
    }
  }, speed);
}

// ============================================================
// PROGRESS BAR
// ============================================================
function startProgress(unitId) {
  let p = 0;
  progressIntervals[unitId] = setInterval(() => {
    p = Math.min(p + 1.5, 88);
    const bar = document.getElementById(`progressBar-${unitId}`);
    if (bar) bar.style.width = p + "%";
  }, 60);
}
function finishProgress(unitId) {
  clearInterval(progressIntervals[unitId]);
  const bar = document.getElementById(`progressBar-${unitId}`);
  if (bar) bar.style.width = "100%";
}

// ============================================================
// API CALL
// ============================================================
async function callUnit(unit, query) {
  const bodyEl = document.getElementById(`body-${unit.id}`);
  if (bodyEl) bodyEl.innerHTML = `<span class="unit-loading" style="color:${unit.color}88">> ANALYZING<span class="cursor">_</span></span>`;
  startProgress(unit.id);

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: unit.persona,
        messages: [{ role: "user", content: query }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "応答エラー";
    finishProgress(unit.id);
    if (bodyEl) typeWrite(`body-${unit.id}`, text, unit.color);
    const negWords = ["危険","反対","問題","困難","失敗","不可","違法","リスク"];
    const negCount = negWords.filter(w => text.includes(w)).length;
    const vote = negCount >= 2 ? "REJECTED" : "APPROVED";
    const voteEl = document.getElementById(`vote-${unit.id}`);
    if (voteEl) {
      voteEl.innerHTML = `<div class="unit-vote ${vote === 'APPROVED' ? 'approved' : 'rejected'}">
        ${vote === 'APPROVED' ? '✓ 承認' : '✗ 否認'}</div>`;
    }
    return { text, vote };
  } catch(e) {
    finishProgress(unit.id);
    const errText = "ユニット応答なし";
    if (bodyEl) bodyEl.textContent = errText;
    return { text: errText, vote: "REJECTED" };
  }
}

async function callVerdict(query, unitTexts) {
  const t = getTheme();
  const summary = t.units.map(u => `${u.name}（${u.subtitle}）: ${unitTexts[u.id]}`).join("\n\n");
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "あなたはMAGIシステムの統合判断AIです。3ユニットの意見を統合して最終判断を150字以内で述べてください。語尾は「と判断する。」で。",
        messages: [{ role: "user", content: `質問：${query}\n\n各ユニット:\n${summary}\n\n統合判断:` }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || "統合判断エラー";
  } catch(e) { return "統合判断ユニット応答なし"; }
}

// ============================================================
// EXECUTE
// ============================================================
async function executeMAGI() {
  const query = document.getElementById("queryInput").value.trim();
  if (!query || isRunning) return;
  isRunning = true;
  responses = {}; votes = {}; verdict = null;
  renderUnits();
  renderVerdict();

  const btn = document.getElementById("execBtn");
  btn.disabled = true; btn.textContent = "PROCESSING...";

  const t = getTheme();
  const results = await Promise.all(t.units.map(u => callUnit(u, query)));
  const unitTexts = {};
  t.units.forEach((u, i) => { unitTexts[u.id] = results[i].text; votes[u.id] = results[i].vote; });

  verdict = await callVerdict(query, unitTexts);
  renderVerdict();

  btn.disabled = false; btn.textContent = "≫ EXECUTE";
  isRunning = false;
}

// ============================================================
// RENDER VERDICT
// ============================================================
function renderVerdict() {
  const container = document.getElementById("verdictContainer");
  if (!verdict) { container.innerHTML = ""; return; }
  const approved = Object.values(votes).filter(v => v === "APPROVED").length;
  const majority = approved >= 2;
  const col = majority ? "#4caf50" : "#f44336";
  container.innerHTML = `
    <div class="verdict-box ${majority ? "" : "rejected"}">
      <div class="scanline"></div>
      <div class="verdict-label">MAGI SYSTEM · INTEGRATED JUDGMENT · ${approved}/3 APPROVED</div>
      <div class="verdict-text" id="verdictText"></div>
      <div class="verdict-result ${majority ? "approved" : "rejected"}">
        ${majority ? "≫ 多数決：承認 ≪" : "≫ 多数決：否認 ≪"}
      </div>
    </div>`;
  typeWrite("verdictText", verdict, col, 14);
}

// ============================================================
// CUSTOMIZE PANEL
// ============================================================
function toggleCustomize() {
  const panel = document.getElementById("customizePanel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) renderCustomizePanel();
}

function renderCustomizePanel() {
  const t = getTheme();
  const editors = document.getElementById("unitEditors");
  editors.innerHTML = t.units.map((unit, i) => `
    <div class="unit-editor">
      <div class="unit-editor-title">
        <span class="unit-editor-dot" style="background:${unit.color}"></span>
        <span style="color:${unit.color}">${unit.name}</span>
      </div>
      <div class="field-label">ユニット名</div>
      <input class="field-input" id="edit-name-${i}" value="${unit.name}" placeholder="例：MELCHIOR-1">
      <div class="field-label">役割・肩書き</div>
      <input class="field-input" id="edit-role-${i}" value="${unit.role}" placeholder="例：データアナリスト">
      <div class="field-label">サブタイトル</div>
      <input class="field-input" id="edit-subtitle-${i}" value="${unit.subtitle}" placeholder="例：論理・分析">
      <div class="field-label">システムプロンプト（判断の視点・口調）</div>
      <textarea class="field-textarea" id="edit-persona-${i}">${unit.persona}</textarea>
    </div>
  `).join('<div style="height:1px;background:#111;margin:4px 0 20px"></div>');
}

function saveCustomize() {
  const t = customThemes[activeThemeId];
  t.units.forEach((unit, i) => {
    const name = document.getElementById(`edit-name-${i}`)?.value.trim();
    const role = document.getElementById(`edit-role-${i}`)?.value.trim();
    const subtitle = document.getElementById(`edit-subtitle-${i}`)?.value.trim();
    const persona = document.getElementById(`edit-persona-${i}`)?.value.trim();
    if (name) unit.name = name;
    if (role) unit.role = role;
    if (subtitle) unit.subtitle = subtitle;
    if (persona) unit.persona = persona;
  });
  try { localStorage.setItem("magi_custom_themes", JSON.stringify(customThemes)); } catch(e) {}
  renderThemeBar();
  renderUnits();
  const fb = document.getElementById("saveFeedback");
  fb.classList.add("show");
  setTimeout(() => fb.classList.remove("show"), 2000);
}

function resetCustomize() {
  if (!confirm("このテーマの設定をリセットしますか？")) return;
  customThemes[activeThemeId] = JSON.parse(JSON.stringify(DEFAULT_THEMES[activeThemeId]));
  try { localStorage.setItem("magi_custom_themes", JSON.stringify(customThemes)); } catch(e) {}
  renderCustomizePanel();
  renderUnits();
}

// ============================================================
// INIT
// ============================================================
renderThemeBar();
applyThemeCSS();
renderUnits();
renderCustomizePanel();
document.getElementById("queryInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.metaKey) executeMAGI();
});
</script>
